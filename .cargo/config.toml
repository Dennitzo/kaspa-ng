# clipboard api is still unstable, so web-sys requires the below flag to be passed for copy (ctrl + c) to work
# https://rustwasm.github.io/docs/wasm-bindgen/web-sys/unstable-apis.html
# check status at https://developer.mozilla.org/en-US/docs/Web/API/Clipboard#browser_compatibility
# we don't use `[build]` because of rust analyzer's build cache invalidation https://github.com/emilk/eframe_template/issues/93
[target.wasm32-unknown-unknown]
rustflags = [
  "--cfg=web_sys_unstable_apis",
  "--cfg=wasm_js",
  '--cfg=getrandom_backend="wasm_js"',
]

[env]
# Ensure macOS builds are resilient even when parent shells export stale AR/RANLIB
# (for example from a previous Homebrew LLVM setup on Apple Silicon paths).
AR_x86_64_apple_darwin = { value = "/usr/bin/ar", force = true }
RANLIB_x86_64_apple_darwin = { value = "/usr/bin/ranlib", force = true }
AR_aarch64_apple_darwin = { value = "/usr/bin/ar", force = true }
RANLIB_aarch64_apple_darwin = { value = "/usr/bin/ranlib", force = true }
