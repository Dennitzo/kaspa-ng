name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    env:
      PKG_CONFIG_PATH: /usr/lib/x86_64-linux-gnu/pkgconfig:/usr/share/pkgconfig
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-latest, windows-latest]

    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Cache bundled PostgreSQL runtime
        uses: actions/cache@v4
        with:
          path: postgres
          key: postgres15-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('scripts/fetch-postgres-runtime.ps1', 'scripts/fetch-postgres-runtime.sh') }}

      - name: Setup bundled PostgreSQL runtime (Unix)
        if: runner.os != 'Windows'
        run: bash ./scripts/fetch-postgres-runtime.sh

      - name: Setup bundled PostgreSQL runtime (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./scripts/fetch-postgres-runtime.ps1 -RepoRoot "$PWD"

      - name: Sync external repositories
        shell: bash
        run: |
          set -euo pipefail
          while IFS='|' read -r dir url; do
            [ -n "${dir}" ] || continue
            if [ ! -d "${dir}/.git" ]; then
              rm -rf "${dir}"
              git clone --depth 1 "${url}" "${dir}"
            fi
          done <<'EOF'
          rusty-kaspa|https://github.com/kaspanet/rusty-kaspa.git
          K|https://github.com/thesheepcat/K.git
          K-indexer|https://github.com/thesheepcat/K-indexer.git
          simply-kaspa-indexer|https://github.com/supertypo/simply-kaspa-indexer.git
          Kasia|https://github.com/K-Kluster/Kasia.git
          kasia-indexer|https://github.com/K-Kluster/kasia-indexer.git
          kasvault|https://github.com/coderofstuff/kasvault.git
          EOF

      - name: Patch rusty-kaspa dependency overrides
        shell: bash
        run: bash ./scripts/patch-rusty-kaspa-workflow-perf-monitor.sh

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: |
            kaspa-explorer-ng/package-lock.json
            K/package-lock.json
            Kasia/package-lock.json
            kasvault/package-lock.json

      - name: Verify Node and npm
        shell: bash
        run: |
          set -euo pipefail
          node -v
          npm -v
          npm install -g npm@latest || true
          npm -v

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry and Pipenv
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install poetry pipenv

      - name: Build dependency stack
        shell: bash
        run: |
          set -euo pipefail
          cd simply-kaspa-indexer
          cargo build --release
          cd ..
          cd kaspa-rest-server
          poetry install
          cd ..
          cd kaspa-socket-server
          pipenv install --deploy --clear
          cd ..
          cd kaspa-explorer-ng
          npm install
          npm run build
          cd ..
          cargo build --release

      - name: Install Protoc (Linux/macOS)
        if: runner.os != 'Windows'
        uses: arduino/setup-protoc@v3
        with:
          version: "30.2"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Protoc (Windows)
        if: runner.os == 'Windows'
        id: setup_protoc_windows
        continue-on-error: true
        uses: arduino/setup-protoc@v3
        with:
          version: "30.2"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fallback Install Protoc (Windows via Chocolatey)
        if: runner.os == 'Windows' && steps.setup_protoc_windows.outcome == 'failure'
        shell: pwsh
        run: |
          choco install protoc --no-progress --yes

      - name: Verify Protoc
        run: protoc --version

      - name: Configure Linux pkg-config path
        if: runner.os == 'Linux'
        run: |
          echo "PKG_CONFIG_PATH=/usr/lib/x86_64-linux-gnu/pkgconfig:/usr/share/pkgconfig" >> $GITHUB_ENV

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            git \
            libssl-dev \
            libglib2.0-dev \
            libatk1.0-dev \
            libgtk-4-dev \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            libx11-dev \
            pkg-config

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ matrix.os }}

      - name: Build kaspa-ng (release)
        run: cargo build --release --bin kaspa-ng

      - name: Build bundled service binaries
        shell: bash
        run: |
          set -euo pipefail
          (cd rusty-kaspa && cargo build --release -p kaspa-stratum-bridge)
          (cd simply-kaspa-indexer && cargo build --release -p simply-kaspa-indexer)
          (cd K-indexer && cargo build --release -p K-webserver -p K-transaction-processor)
          (cd kasia-indexer && cargo build --release -p indexer)

      - name: Verify bundled service binaries
        shell: bash
        run: |
          set -euo pipefail
          if [ "$RUNNER_OS" = "Windows" ]; then ext=".exe"; else ext=""; fi
          missing=0
          for bin in "stratum-bridge" "simply-kaspa-indexer" "K-webserver" "K-transaction-processor" "kasia-indexer"; do
            found=""
            for base in target/release rusty-kaspa/target/release simply-kaspa-indexer/target/release K-indexer/target/release kasia-indexer/target/release; do
              if [ -f "${base}/${bin}${ext}" ]; then
                found="${base}/${bin}${ext}"
                break
              elif [ "${bin}" = "kasia-indexer" ] && [ -f "${base}/indexer${ext}" ]; then
                found="${base}/indexer${ext}"
                break
              fi
            done
            if [ -z "$found" ]; then
              echo "Missing binary: ${bin}${ext}"
              missing=1
            else
              echo "Found: ${found}"
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Package (macOS/Linux)
        if: runner.os != 'Windows'
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          bash ./scripts/stage-postgres-runtime.sh target/release/postgres
          OUT="kaspa-ng-${{ runner.os }}-${RELEASE_TAG}.tar.gz"
          rm -rf dist
          mkdir -p dist
          if [ "$RUNNER_OS" = "macOS" ]; then
            ./scripts/macos-bundle.sh release
            cp -R target/release/Kaspa-NG.app dist/
            cp target/release/kaspa-ng dist/
            for bin in stratum-bridge simply-kaspa-indexer K-webserver K-transaction-processor kasia-indexer; do
              if [ -f "target/release/${bin}" ]; then
                cp "target/release/${bin}" dist/
              elif [ -f "rusty-kaspa/target/release/${bin}" ]; then
                cp "rusty-kaspa/target/release/${bin}" dist/
              elif [ -f "simply-kaspa-indexer/target/release/${bin}" ]; then
                cp "simply-kaspa-indexer/target/release/${bin}" dist/
              elif [ -f "K-indexer/target/release/${bin}" ]; then
                cp "K-indexer/target/release/${bin}" dist/
              elif [ -f "kasia-indexer/target/release/indexer" ] && [ "${bin}" = "kasia-indexer" ]; then
                cp "kasia-indexer/target/release/indexer" "dist/${bin}"
              fi
            done
            if [ -d target/release/kaspa-explorer-ng ]; then
              cp -r target/release/kaspa-explorer-ng dist/
            elif [ -d kaspa-explorer-ng/build ]; then
              mkdir -p dist/kaspa-explorer-ng
              cp -r kaspa-explorer-ng/build dist/kaspa-explorer-ng/
            fi
            if [ -d target/release/K/dist ]; then
              mkdir -p dist/K
              cp -r target/release/K/dist dist/K/
            elif [ -d K/dist ]; then
              mkdir -p dist/K
              cp -r K/dist dist/K/
            fi
            if [ -d target/release/Kasia/dist ]; then
              mkdir -p dist/Kasia
              cp -r target/release/Kasia/dist dist/Kasia/
            elif [ -d Kasia/dist ]; then
              mkdir -p dist/Kasia
              cp -r Kasia/dist dist/Kasia/
            fi
            if [ -d target/release/KasVault/build ]; then
              mkdir -p dist/KasVault
              cp -r target/release/KasVault/build dist/KasVault/
            elif [ -d kasvault/build ]; then
              mkdir -p dist/KasVault
              cp -r kasvault/build dist/KasVault/
            fi
            if [ ! -d dist/Kaspa-NG.app ] || [ ! -f dist/Kaspa-NG.app/Contents/MacOS/kaspa-ng ]; then
              echo "Missing packaged app bundle: Kaspa-NG.app"
              exit 1
            fi
            arch="$(echo "$RUNNER_ARCH" | tr '[:upper:]' '[:lower:]')"
            MACOS_APP_BUNDLE_OUT="kaspa-ng-${RELEASE_TAG}-macos-${arch}.app.zip"
            ditto -c -k --sequesterRsrc --keepParent dist/Kaspa-NG.app "${MACOS_APP_BUNDLE_OUT}"
            [ -f "${MACOS_APP_BUNDLE_OUT}" ] || { echo "Failed to create macOS app bundle archive"; exit 1; }
            echo "MACOS_APP_BUNDLE_ASSET=${MACOS_APP_BUNDLE_OUT}" >> "$GITHUB_ENV"
          else
            cp target/release/kaspa-ng dist/
            for bin in stratum-bridge simply-kaspa-indexer K-webserver K-transaction-processor kasia-indexer; do
              if [ -f "target/release/${bin}" ]; then
                cp "target/release/${bin}" dist/
              elif [ -f "rusty-kaspa/target/release/${bin}" ]; then
                cp "rusty-kaspa/target/release/${bin}" dist/
              elif [ -f "simply-kaspa-indexer/target/release/${bin}" ]; then
                cp "simply-kaspa-indexer/target/release/${bin}" dist/
              elif [ -f "K-indexer/target/release/${bin}" ]; then
                cp "K-indexer/target/release/${bin}" dist/
              elif [ -f "kasia-indexer/target/release/indexer" ] && [ "${bin}" = "kasia-indexer" ]; then
                cp "kasia-indexer/target/release/indexer" "dist/${bin}"
              fi
            done
            if [ -d target/release/kaspa-explorer-ng ]; then
              cp -r target/release/kaspa-explorer-ng dist/
            elif [ -d kaspa-explorer-ng/build ]; then
              mkdir -p dist/kaspa-explorer-ng
              cp -r kaspa-explorer-ng/build dist/kaspa-explorer-ng/
            fi
            if [ -d target/release/K/dist ]; then
              mkdir -p dist/K
              cp -r target/release/K/dist dist/K/
            elif [ -d K/dist ]; then
              mkdir -p dist/K
              cp -r K/dist dist/K/
            fi
            if [ -d target/release/Kasia/dist ]; then
              mkdir -p dist/Kasia
              cp -r target/release/Kasia/dist dist/Kasia/
            elif [ -d Kasia/dist ]; then
              mkdir -p dist/Kasia
              cp -r Kasia/dist dist/Kasia/
            fi
            if [ -d target/release/KasVault/build ]; then
              mkdir -p dist/KasVault
              cp -r target/release/KasVault/build dist/KasVault/
            elif [ -d kasvault/build ]; then
              mkdir -p dist/KasVault
              cp -r kasvault/build dist/KasVault/
            fi
            cp core/resources/icons/icon-256.png dist/kaspa-ng.png
            cp core/resources/packaging/kaspa-ng.desktop dist/
          fi
          if [ -d kaspa-rest-server ]; then
            cp -r kaspa-rest-server dist/
          fi
          if [ -d kaspa-socket-server ]; then
            cp -r kaspa-socket-server dist/
          fi
          if [ -d Loader ]; then
            cp -r Loader dist/
          fi
          if [ ! -d target/release/postgres ]; then
            echo "Missing staged PostgreSQL runtime: target/release/postgres"
            exit 1
          fi
          cp -r target/release/postgres dist/postgres
          required_files=(kaspa-ng stratum-bridge simply-kaspa-indexer K-webserver K-transaction-processor kasia-indexer)
          for f in "${required_files[@]}"; do
            if [ ! -f "dist/${f}" ]; then
              echo "Missing packaged binary: ${f}"
              exit 1
            fi
          done
          required_dirs=(kaspa-explorer-ng kaspa-rest-server kaspa-socket-server Loader)
          for d in "${required_dirs[@]}"; do
            if [ ! -d "dist/${d}" ]; then
              echo "Missing packaged directory: ${d}"
              exit 1
            fi
          done
          if [ "$RUNNER_OS" = "Linux" ]; then
            bash ./scripts/verify-linux-artifact.sh dist
          else
            bash ./scripts/verify-self-hosted-python-runtime.sh dist
          fi
          for d in K Kasia KasVault; do
            if [ ! -d "dist/${d}" ]; then
              echo "Optional packaged directory missing: ${d} (continuing)"
            fi
          done
          cp README.md LICENSE dist/
          tar -czf "${OUT}" -C dist .
          echo "ASSET=${OUT}" >> "$GITHUB_ENV"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          ./scripts/stage-postgres-runtime.ps1 -RepoRoot "$PWD" -OutDir "target\release\postgres"
          $out = "kaspa-ng-Windows-$env:RELEASE_TAG.zip"
          if (Test-Path dist) { Remove-Item -Recurse -Force dist }
          New-Item -ItemType Directory -Path dist | Out-Null
          if (-not (Test-Path "target\\release\\kaspa-explorer-ng") -and -not (Test-Path "kaspa-explorer-ng\\build") -and (Test-Path "kaspa-explorer-ng")) {
            Write-Host "kaspa-explorer-ng build missing after cargo build; running fallback build"
            Push-Location kaspa-explorer-ng
            if (Test-Path package-lock.json) {
              npm ci --prefer-offline --no-audit --no-fund
              if ($LASTEXITCODE -ne 0) {
                npm install --no-audit --no-fund
              }
            } else {
              npm install --no-audit --no-fund
            }
            if ($LASTEXITCODE -ne 0) {
              Pop-Location
              throw "kaspa-explorer-ng npm install failed"
            }
            npm run build
            if ($LASTEXITCODE -ne 0) {
              Pop-Location
              throw "kaspa-explorer-ng build failed"
            }
            Pop-Location
          }
          Copy-Item target\release\kaspa-ng.exe dist\
          $bins = @(
            "stratum-bridge.exe",
            "simply-kaspa-indexer.exe",
            "K-webserver.exe",
            "K-transaction-processor.exe",
            "kasia-indexer.exe"
          )
          foreach ($bin in $bins) {
            if (Test-Path "target\\release\\$bin") {
              Copy-Item "target\\release\\$bin" dist\
            } elseif (Test-Path "rusty-kaspa\\target\\release\\$bin") {
              Copy-Item "rusty-kaspa\\target\\release\\$bin" dist\
            } elseif (Test-Path "simply-kaspa-indexer\\target\\release\\$bin") {
              Copy-Item "simply-kaspa-indexer\\target\\release\\$bin" dist\
            } elseif (Test-Path "K-indexer\\target\\release\\$bin") {
              Copy-Item "K-indexer\\target\\release\\$bin" dist\
            } elseif ($bin -eq "kasia-indexer.exe" -and (Test-Path "kasia-indexer\\target\\release\\indexer.exe")) {
              Copy-Item "kasia-indexer\\target\\release\\indexer.exe" "dist\\kasia-indexer.exe"
            }
          }
          if (Test-Path kaspa-explorer-ng\build) {
            New-Item -ItemType Directory -Path dist\kaspa-explorer-ng | Out-Null
            Copy-Item -Recurse -Force kaspa-explorer-ng\build dist\kaspa-explorer-ng\
          }
          if (Test-Path target\release\K\dist) {
            New-Item -ItemType Directory -Path dist\K | Out-Null
            Copy-Item -Recurse -Force target\release\K\dist dist\K\
          } elseif (Test-Path K\dist) {
            New-Item -ItemType Directory -Path dist\K | Out-Null
            Copy-Item -Recurse -Force K\dist dist\K\
          }
          if (Test-Path target\release\Kasia\dist) {
            New-Item -ItemType Directory -Path dist\Kasia | Out-Null
            Copy-Item -Recurse -Force target\release\Kasia\dist dist\Kasia\
          } elseif (Test-Path Kasia\dist) {
            New-Item -ItemType Directory -Path dist\Kasia | Out-Null
            Copy-Item -Recurse -Force Kasia\dist dist\Kasia\
          }
          if (Test-Path target\release\KasVault\build) {
            New-Item -ItemType Directory -Path dist\KasVault | Out-Null
            Copy-Item -Recurse -Force target\release\KasVault\build dist\KasVault\
          } elseif (Test-Path kasvault\build) {
            New-Item -ItemType Directory -Path dist\KasVault | Out-Null
            Copy-Item -Recurse -Force kasvault\build dist\KasVault\
          }
          if (Test-Path kaspa-rest-server) {
            Copy-Item -Recurse -Force kaspa-rest-server dist\
          }
          if (Test-Path kaspa-socket-server) {
            Copy-Item -Recurse -Force kaspa-socket-server dist\
          }
          if (Test-Path Loader) {
            Copy-Item -Recurse -Force Loader dist\
          }
          if (-not (Test-Path target\release\postgres)) {
            throw "Missing staged PostgreSQL runtime: target\\release\\postgres"
          }
          Copy-Item -Recurse -Force target\release\postgres dist\postgres
          $requiredFiles = @(
            "kaspa-ng.exe",
            "stratum-bridge.exe",
            "simply-kaspa-indexer.exe",
            "K-webserver.exe",
            "K-transaction-processor.exe",
            "kasia-indexer.exe"
          )
          foreach ($f in $requiredFiles) {
            if (-not (Test-Path "dist\\$f")) {
              throw "Missing packaged binary: $f"
            }
          }
          $requiredDirs = @("kaspa-explorer-ng", "kaspa-rest-server", "kaspa-socket-server", "Loader")
          foreach ($d in $requiredDirs) {
            if (-not (Test-Path "dist\\$d")) {
              throw "Missing packaged directory: $d"
            }
          }
          ./scripts/verify-self-hosted-python-runtime.ps1 -ArtifactRoot "dist"
          if (-not (Test-Path "dist\\postgres")) {
            throw "Missing packaged directory: postgres"
          }
          if (-not (Test-Path "dist\\postgres\\bin\\postgres.exe")) {
            throw "Missing PostgreSQL runtime binary: dist\\postgres\\bin\\postgres.exe"
          }
          foreach ($d in @("K", "Kasia", "KasVault")) {
            if (-not (Test-Path "dist\\$d")) {
              Write-Host "Optional packaged directory missing: $d (continuing)"
            }
          }
          Copy-Item README.md dist\
          Copy-Item LICENSE dist\
          if (Test-Path $out) { Remove-Item $out }
          Compress-Archive -Path dist\* -DestinationPath $out
          Add-Content -Path $env:GITHUB_ENV -Value "ASSET=$out"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kaspa-ng-${{ runner.os }}-${{ github.ref_name }}
          path: ${{ env.ASSET }}
          overwrite: true

      - name: Upload macOS App Bundle artifact
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: kaspa-ng-macos-app-bundle-${{ github.ref_name }}
          path: ${{ env.MACOS_APP_BUNDLE_ASSET }}
          overwrite: true

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ASSET }}
          body_path: RELEASE_NOTES.md
