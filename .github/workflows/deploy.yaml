name: Build and upload assets
on:
  release:
    types: [ published ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Build gnu-linux on ubuntu-18.04 and musl on ubuntu latest
        # os: [ ubuntu-18.04, ubuntu-latest, windows-latest, macos-latest ]
        os: [ ubuntu-22.04, windows-latest, macos-latest ]
    name: Building, ${{ matrix.os }}
    steps:
      - name: Fix CRLF on Windows
        if: runner.os == 'Windows'
        run: git config --global core.autocrlf false

      - name: Install desktop dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt install -y libglib2.0-dev libatk1.0-dev libgtk-3-dev librust-atk-dev

      - name: Checkout sources
        uses: actions/checkout@v3

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: kaspa-explorer-ng/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry and Pipenv
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install poetry pipenv

      - name: Build dependency stack
        shell: bash
        run: |
          set -euo pipefail
          cd simply-kaspa-indexer
          cargo build --release
          cd ..
          cd kaspa-rest-server
          poetry install
          cd ..
          cd kaspa-socket-server
          pipenv install --deploy --clear
          cd ..
          cd kaspa-explorer-ng
          npm install
          npm run build
          cd ..
          cargo build --release

      - name: Install Protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build bundled service binaries
        shell: bash
        run: |
          set -euo pipefail
          (cd rusty-kaspa && cargo build --release -p kaspa-stratum-bridge -p rothschild)
          (cd cpuminer && cargo build --release)
          (cd simply-kaspa-indexer && cargo build --release -p simply-kaspa-indexer)
          (cd K-indexer && cargo build --release -p K-webserver -p K-transaction-processor)

      - name: Verify bundled service binaries
        shell: bash
        run: |
          set -euo pipefail
          if [ "$RUNNER_OS" = "Windows" ]; then ext=".exe"; else ext=""; fi
          missing=0
          for bin in "stratum-bridge" "kaspa-miner" "rothschild" "simply-kaspa-indexer" "K-webserver" "K-transaction-processor"; do
            found=""
            for base in target/release rusty-kaspa/target/release cpuminer/target/release simply-kaspa-indexer/target/release K-indexer/target/release; do
              if [ -f "${base}/${bin}${ext}" ]; then
                found="${base}/${bin}${ext}"
                break
              fi
            done
            if [ -z "$found" ]; then
              echo "Missing binary: ${bin}${ext}"
              missing=1
            else
              echo "Found: ${found}"
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Cache
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-${{ runner.arch }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install zig on linux
        if: runner.os == 'Linux'
        uses: goto-bus-stop/setup-zig@v2 # needed for cargo-zigbuild

      - name: Build on Windows
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir kaspa-ng-${{ github.event.release.tag_name }}-windows-x64 || true
          cargo build --bin kaspa-ng --release
          cp target/release/kaspa-ng.exe kaspa-ng-${{ github.event.release.tag_name }}-windows-x64/
          for bin in stratum-bridge.exe kaspa-miner.exe rothschild.exe simply-kaspa-indexer.exe K-webserver.exe K-transaction-processor.exe; do
            if [ -f "target/release/${bin}" ]; then
              cp "target/release/${bin}" kaspa-ng-${{ github.event.release.tag_name }}-windows-x64/
            elif [ -f "rusty-kaspa/target/release/${bin}" ]; then
              cp "rusty-kaspa/target/release/${bin}" kaspa-ng-${{ github.event.release.tag_name }}-windows-x64/
            elif [ -f "cpuminer/target/release/${bin}" ]; then
              cp "cpuminer/target/release/${bin}" kaspa-ng-${{ github.event.release.tag_name }}-windows-x64/
            elif [ -f "simply-kaspa-indexer/target/release/${bin}" ]; then
              cp "simply-kaspa-indexer/target/release/${bin}" kaspa-ng-${{ github.event.release.tag_name }}-windows-x64/
            elif [ -f "K-indexer/target/release/${bin}" ]; then
              cp "K-indexer/target/release/${bin}" kaspa-ng-${{ github.event.release.tag_name }}-windows-x64/
            fi
          done
          if [ -d target/release/kaspa-explorer-ng ]; then
            cp -r target/release/kaspa-explorer-ng kaspa-ng-${{ github.event.release.tag_name }}-windows-x64/
          elif [ -d kaspa-explorer-ng/build ]; then
            mkdir -p kaspa-ng-${{ github.event.release.tag_name }}-windows-x64/kaspa-explorer-ng
            cp -r kaspa-explorer-ng/build kaspa-ng-${{ github.event.release.tag_name }}-windows-x64/kaspa-explorer-ng/
          fi
          if [ -d kaspa-rest-server ]; then
            cp -r kaspa-rest-server kaspa-ng-${{ github.event.release.tag_name }}-windows-x64/
          fi
          if [ -d kaspa-socket-server ]; then
            cp -r kaspa-socket-server kaspa-ng-${{ github.event.release.tag_name }}-windows-x64/
          fi
          for f in kaspa-ng.exe stratum-bridge.exe kaspa-miner.exe rothschild.exe simply-kaspa-indexer.exe K-webserver.exe K-transaction-processor.exe; do
            [ -f "kaspa-ng-${{ github.event.release.tag_name }}-windows-x64/${f}" ] || { echo "Missing packaged binary: ${f}"; exit 1; }
          done
          for d in kaspa-explorer-ng kaspa-rest-server kaspa-socket-server; do
            [ -d "kaspa-ng-${{ github.event.release.tag_name }}-windows-x64/${d}" ] || { echo "Missing packaged directory: ${d}"; exit 1; }
          done
          archive="kaspa-ng-${{ github.event.release.tag_name }}-windows-x64/kaspa-ng-${{ github.event.release.tag_name }}-windows-x64.zip"
          asset_name="kaspa-ng-${{ github.event.release.tag_name }}-windows-x64.zip"
          powershell "Compress-Archive kaspa-ng-${{ github.event.release.tag_name }}-windows-x64/* \"${archive}\""
          echo "asset_path=${archive}" >> $GITHUB_ENV
          echo "asset_name=${asset_name}" >> $GITHUB_ENV

      - name: Build on MacOS (arm64)
        if: |
          runner.os == 'macOS' &&
          runner.arch == 'ARM64'
        run: |
          cargo build --bin kaspa-ng --release
          ROOT="kaspa-ng-${{ github.event.release.tag_name }}-macos-arm64"
          mkdir -p "$ROOT"
          cp target/release/kaspa-ng "$ROOT/"
          for bin in stratum-bridge kaspa-miner rothschild simply-kaspa-indexer K-webserver K-transaction-processor; do
            if [ -f "target/release/${bin}" ]; then
              cp "target/release/${bin}" "$ROOT/"
            elif [ -f "rusty-kaspa/target/release/${bin}" ]; then
              cp "rusty-kaspa/target/release/${bin}" "$ROOT/"
            elif [ -f "cpuminer/target/release/${bin}" ]; then
              cp "cpuminer/target/release/${bin}" "$ROOT/"
            elif [ -f "simply-kaspa-indexer/target/release/${bin}" ]; then
              cp "simply-kaspa-indexer/target/release/${bin}" "$ROOT/"
            elif [ -f "K-indexer/target/release/${bin}" ]; then
              cp "K-indexer/target/release/${bin}" "$ROOT/"
            fi
          done
          if [ -d target/release/kaspa-explorer-ng ]; then
            cp -r target/release/kaspa-explorer-ng "$ROOT/"
          elif [ -d kaspa-explorer-ng/build ]; then
            mkdir -p "$ROOT/kaspa-explorer-ng"
            cp -r kaspa-explorer-ng/build "$ROOT/kaspa-explorer-ng/"
          fi
          if [ -d kaspa-rest-server ]; then
            cp -r kaspa-rest-server "$ROOT/"
          fi
          if [ -d kaspa-socket-server ]; then
            cp -r kaspa-socket-server "$ROOT/"
          fi
          for f in kaspa-ng stratum-bridge kaspa-miner rothschild simply-kaspa-indexer K-webserver K-transaction-processor; do
            [ -f "$ROOT/${f}" ] || { echo "Missing packaged binary: ${f}"; exit 1; }
          done
          for d in kaspa-explorer-ng kaspa-rest-server kaspa-socket-server; do
            [ -d "$ROOT/${d}" ] || { echo "Missing packaged directory: ${d}"; exit 1; }
          done
          archive="kaspa-ng-${{ github.event.release.tag_name }}-macos-arm64/kaspa-ng-${{ github.event.release.tag_name }}-macos-arm64.zip"
          asset_name="kaspa-ng-${{ github.event.release.tag_name }}-macos-arm64.zip"
          zip -r "${archive}" ./kaspa-ng-${{ github.event.release.tag_name }}-macos-arm64/*
          echo "asset_path=${archive}" >> $GITHUB_ENV
          echo "asset_name=${asset_name}" >> $GITHUB_ENV

      - name: Build on MacOS (x64)
        if: |
          runner.os == 'macOS' &&
          runner.arch == 'x64'
        run: |
          cargo build --bin kaspa-ng --release
          ROOT="kaspa-ng-${{ github.event.release.tag_name }}-macos-x64"
          mkdir -p "$ROOT"
          cp target/release/kaspa-ng "$ROOT/"
          for bin in stratum-bridge kaspa-miner rothschild simply-kaspa-indexer K-webserver K-transaction-processor; do
            if [ -f "target/release/${bin}" ]; then
              cp "target/release/${bin}" "$ROOT/"
            elif [ -f "rusty-kaspa/target/release/${bin}" ]; then
              cp "rusty-kaspa/target/release/${bin}" "$ROOT/"
            elif [ -f "cpuminer/target/release/${bin}" ]; then
              cp "cpuminer/target/release/${bin}" "$ROOT/"
            elif [ -f "simply-kaspa-indexer/target/release/${bin}" ]; then
              cp "simply-kaspa-indexer/target/release/${bin}" "$ROOT/"
            elif [ -f "K-indexer/target/release/${bin}" ]; then
              cp "K-indexer/target/release/${bin}" "$ROOT/"
            fi
          done
          if [ -d target/release/kaspa-explorer-ng ]; then
            cp -r target/release/kaspa-explorer-ng "$ROOT/"
          elif [ -d kaspa-explorer-ng/build ]; then
            mkdir -p "$ROOT/kaspa-explorer-ng"
            cp -r kaspa-explorer-ng/build "$ROOT/kaspa-explorer-ng/"
          fi
          if [ -d kaspa-rest-server ]; then
            cp -r kaspa-rest-server "$ROOT/"
          fi
          if [ -d kaspa-socket-server ]; then
            cp -r kaspa-socket-server "$ROOT/"
          fi
          for f in kaspa-ng stratum-bridge kaspa-miner rothschild simply-kaspa-indexer K-webserver K-transaction-processor; do
            [ -f "$ROOT/${f}" ] || { echo "Missing packaged binary: ${f}"; exit 1; }
          done
          for d in kaspa-explorer-ng kaspa-rest-server kaspa-socket-server; do
            [ -d "$ROOT/${d}" ] || { echo "Missing packaged directory: ${d}"; exit 1; }
          done
          archive="kaspa-ng-${{ github.event.release.tag_name }}-macos-x64/kaspa-ng-${{ github.event.release.tag_name }}-macos-x64.zip"
          asset_name="kaspa-ng-${{ github.event.release.tag_name }}-macos-x64.zip"
          zip -r "${archive}" ./kaspa-ng-${{ github.event.release.tag_name }}-macos-x64/*
          echo "asset_path=${archive}" >> $GITHUB_ENV
          echo "asset_name=${asset_name}" >> $GITHUB_ENV

      - name: Build on Linux
        if: runner.os == 'Linux'
        run: |
          cargo build --bin kaspa-ng --release
          mkdir -p .debpkg/usr/bin
          cp target/release/kaspa-ng .debpkg/usr/bin/
          mkdir kaspa-ng-${{ github.event.release.tag_name }}-linux-gnu-amd64 || true
          cp target/release/kaspa-ng kaspa-ng-${{ github.event.release.tag_name }}-linux-gnu-amd64/
          for bin in stratum-bridge kaspa-miner rothschild simply-kaspa-indexer K-webserver K-transaction-processor; do
            if [ -f "target/release/${bin}" ]; then
              cp "target/release/${bin}" kaspa-ng-${{ github.event.release.tag_name }}-linux-gnu-amd64/
              cp "target/release/${bin}" .debpkg/usr/bin/
            elif [ -f "rusty-kaspa/target/release/${bin}" ]; then
              cp "rusty-kaspa/target/release/${bin}" kaspa-ng-${{ github.event.release.tag_name }}-linux-gnu-amd64/
              cp "rusty-kaspa/target/release/${bin}" .debpkg/usr/bin/
            elif [ -f "cpuminer/target/release/${bin}" ]; then
              cp "cpuminer/target/release/${bin}" kaspa-ng-${{ github.event.release.tag_name }}-linux-gnu-amd64/
              cp "cpuminer/target/release/${bin}" .debpkg/usr/bin/
            elif [ -f "simply-kaspa-indexer/target/release/${bin}" ]; then
              cp "simply-kaspa-indexer/target/release/${bin}" kaspa-ng-${{ github.event.release.tag_name }}-linux-gnu-amd64/
              cp "simply-kaspa-indexer/target/release/${bin}" .debpkg/usr/bin/
            elif [ -f "K-indexer/target/release/${bin}" ]; then
              cp "K-indexer/target/release/${bin}" kaspa-ng-${{ github.event.release.tag_name }}-linux-gnu-amd64/
              cp "K-indexer/target/release/${bin}" .debpkg/usr/bin/
            fi
          done
          if [ -d target/release/kaspa-explorer-ng ]; then
            cp -r target/release/kaspa-explorer-ng kaspa-ng-${{ github.event.release.tag_name }}-linux-gnu-amd64/
            mkdir -p .debpkg/usr/bin/kaspa-explorer-ng
            cp -r target/release/kaspa-explorer-ng/* .debpkg/usr/bin/kaspa-explorer-ng/
          elif [ -d kaspa-explorer-ng/build ]; then
            mkdir -p kaspa-ng-${{ github.event.release.tag_name }}-linux-gnu-amd64/kaspa-explorer-ng
            cp -r kaspa-explorer-ng/build kaspa-ng-${{ github.event.release.tag_name }}-linux-gnu-amd64/kaspa-explorer-ng/
            mkdir -p .debpkg/usr/bin/kaspa-explorer-ng
            cp -r kaspa-explorer-ng/build .debpkg/usr/bin/kaspa-explorer-ng/
          fi
          if [ -d kaspa-rest-server ]; then
            cp -r kaspa-rest-server kaspa-ng-${{ github.event.release.tag_name }}-linux-gnu-amd64/
          fi
          if [ -d kaspa-socket-server ]; then
            cp -r kaspa-socket-server kaspa-ng-${{ github.event.release.tag_name }}-linux-gnu-amd64/
          fi
          cp core/resources/icons/icon-256.png kaspa-ng-${{ github.event.release.tag_name }}-linux-gnu-amd64/kaspa-ng.png
          cp core/resources/packaging/kaspa-ng.desktop kaspa-ng-${{ github.event.release.tag_name }}-linux-gnu-amd64/
          for f in kaspa-ng stratum-bridge kaspa-miner rothschild simply-kaspa-indexer K-webserver K-transaction-processor; do
            [ -f "kaspa-ng-${{ github.event.release.tag_name }}-linux-gnu-amd64/${f}" ] || { echo "Missing packaged binary: ${f}"; exit 1; }
          done
          for d in kaspa-explorer-ng kaspa-rest-server kaspa-socket-server; do
            [ -d "kaspa-ng-${{ github.event.release.tag_name }}-linux-gnu-amd64/${d}" ] || { echo "Missing packaged directory: ${d}"; exit 1; }
          done
          mkdir -p .debpkg/usr/share/icons/hicolor/256x256/apps
          cp core/resources/icons/icon-256.png .debpkg/usr/share/icons/hicolor/256x256/apps/kaspa-ng.png
          mkdir -p .debpkg/usr/share/applications
          cp core/resources/packaging/kaspa-ng.desktop .debpkg/usr/share/applications/
          archive="kaspa-ng-${{ github.event.release.tag_name }}-linux-gnu-amd64/kaspa-ng-${{ github.event.release.tag_name }}-linux-gnu-amd64.zip"
          asset_name="kaspa-ng-${{ github.event.release.tag_name }}-linux-gnu-amd64.zip"
          zip -r "${archive}" ./kaspa-ng-${{ github.event.release.tag_name }}-linux-gnu-amd64/*
          echo "archive=${archive}" >> $GITHUB_ENV
          echo "asset_name=${asset_name}" >> $GITHUB_ENV

      - name: Create Linux Debian Package
        if: runner.os == 'Linux'
        id: package_debian
        uses: jiro4989/build-deb-action@v3
        with:
          package: kaspa-ng
          package_root: .debpkg
          maintainer: ASPECTRON
          version: ${{ github.ref }} # refs/tags/v*.*.*
          arch: 'amd64'
          depends: 'libglib2.0-0, libatk1.0-0, libgtk-3-0'
          desc: 'Kaspa NG desktop p2p node and wallet'

      - name: Upload release asset
        if: runner.os == 'Windows'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: "./${{ env.asset_path }}"
          asset_name: "${{ env.asset_name }}"
          asset_content_type: application/zip

      - name: Build on MacOS (arm64)
        if: |
          runner.os == 'macOS' &&
          runner.arch == 'ARM64'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: "./${{ env.asset_path }}"
          asset_name: "${{ env.asset_name }}"
          asset_content_type: application/zip

      - name: Build on MacOS (x64)
        if: |
          runner.os == 'macOS' &&
          runner.arch == 'x64'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: "./${{ env.asset_path }}"
          asset_name: "${{ env.asset_name }}"
          asset_content_type: application/zip

      - name: Upload debian package
        if: runner.os == 'Linux'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: "./${{ steps.package_debian.outputs.file_name }}"
          asset_name: "${{ steps.package_debian.outputs.file_name }}"
          asset_content_type: application/vnd.debian.binary-package
