name: Build and upload assets
on:
  release:
    types: [ published ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Build gnu-linux on ubuntu-18.04 and musl on ubuntu latest
        # os: [ ubuntu-18.04, ubuntu-latest, windows-latest, macos-latest ]
        os: [ ubuntu-22.04, windows-latest, macos-latest ]
    name: Building, ${{ matrix.os }}
    steps:
      - name: Fix CRLF on Windows
        if: runner.os == 'Windows'
        run: git config --global core.autocrlf false

      - name: Install desktop dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt install -y libglib2.0-dev libatk1.0-dev libgtk-3-dev librust-atk-dev

      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Cache bundled PostgreSQL runtime
        uses: actions/cache@v4
        with:
          path: postgres
          key: postgres15-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('scripts/fetch-postgres-runtime.ps1', 'scripts/fetch-postgres-runtime.sh') }}

      - name: Setup bundled PostgreSQL runtime (Unix)
        if: runner.os != 'Windows'
        run: bash ./scripts/fetch-postgres-runtime.sh

      - name: Setup bundled PostgreSQL runtime (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./scripts/fetch-postgres-runtime.ps1 -RepoRoot "$PWD"

      - name: Sync external repositories
        shell: bash
        run: |
          set -euo pipefail
          while IFS='|' read -r dir url; do
            [ -n "${dir}" ] || continue
            if [ ! -d "${dir}/.git" ]; then
              rm -rf "${dir}"
              git clone --depth 1 "${url}" "${dir}"
            fi
          done <<'EOF'
          rusty-kaspa|https://github.com/kaspanet/rusty-kaspa.git
          K|https://github.com/thesheepcat/K.git
          K-indexer|https://github.com/thesheepcat/K-indexer.git
          simply-kaspa-indexer|https://github.com/supertypo/simply-kaspa-indexer.git
          Kasia|https://github.com/K-Kluster/Kasia.git
          kasia-indexer|https://github.com/K-Kluster/kasia-indexer.git
          kasvault|https://github.com/coderofstuff/kasvault.git
          EOF

      - name: Patch rusty-kaspa dependency overrides
        shell: bash
        run: bash ./scripts/patch-rusty-kaspa-workflow-perf-monitor.sh

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: kaspa-explorer-ng/package-lock.json

      - name: Verify Node and npm
        shell: bash
        run: |
          set -euo pipefail
          node -v
          npm -v
          npm install -g npm@latest || true
          npm -v

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry and Pipenv
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install poetry pipenv

      - name: Build dependency stack
        shell: bash
        run: |
          set -euo pipefail
          cd simply-kaspa-indexer
          cargo build --release
          cd ..
          cd kaspa-rest-server
          poetry install
          cd ..
          cd kaspa-socket-server
          pipenv install --deploy --clear
          cd ..
          cd kaspa-explorer-ng
          npm install
          npm run build
          cd ..
          cargo build --release

      - name: Install Protoc (Linux/macOS)
        if: runner.os != 'Windows'
        uses: arduino/setup-protoc@v3
        with:
          version: "30.2"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Protoc (Windows)
        if: runner.os == 'Windows'
        id: setup_protoc_windows
        continue-on-error: true
        uses: arduino/setup-protoc@v3
        with:
          version: "30.2"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fallback Install Protoc (Windows via Chocolatey)
        if: runner.os == 'Windows' && steps.setup_protoc_windows.outcome == 'failure'
        shell: pwsh
        run: |
          choco install protoc --no-progress --yes

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build bundled service binaries
        shell: bash
        run: |
          set -euo pipefail
          (cd rusty-kaspa && cargo build --release -p kaspa-stratum-bridge)
          (cd simply-kaspa-indexer && cargo build --release -p simply-kaspa-indexer)
          (cd K-indexer && cargo build --release -p K-webserver -p K-transaction-processor)
          (cd kasia-indexer && cargo build --release -p indexer)

      - name: Verify bundled service binaries
        shell: bash
        run: |
          set -euo pipefail
          if [ "$RUNNER_OS" = "Windows" ]; then ext=".exe"; else ext=""; fi
          missing=0
          for bin in "stratum-bridge" "simply-kaspa-indexer" "K-webserver" "K-transaction-processor" "kasia-indexer"; do
            found=""
            for base in target/release rusty-kaspa/target/release simply-kaspa-indexer/target/release K-indexer/target/release kasia-indexer/target/release; do
              if [ -f "${base}/${bin}${ext}" ]; then
                found="${base}/${bin}${ext}"
                break
              elif [ "${bin}" = "kasia-indexer" ] && [ -f "${base}/indexer${ext}" ]; then
                found="${base}/indexer${ext}"
                break
              fi
            done
            if [ -z "$found" ]; then
              echo "Missing binary: ${bin}${ext}"
              missing=1
            else
              echo "Found: ${found}"
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-${{ runner.arch }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install zig on linux
        if: runner.os == 'Linux'
        uses: goto-bus-stop/setup-zig@v2 # needed for cargo-zigbuild

      - name: Build on Windows
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir kaspa-ng-${{ github.event.release.tag_name }}-windows-x64 || true
          pwsh -NoProfile -ExecutionPolicy Bypass -File ./scripts/stage-postgres-runtime.ps1 -RepoRoot "$PWD" -OutDir "target/release/postgres"
          cargo build --bin kaspa-ng --release
          if [ ! -d target/release/kaspa-explorer-ng ] && [ ! -d kaspa-explorer-ng/build ] && [ -d kaspa-explorer-ng ]; then
            echo "kaspa-explorer-ng build missing after cargo build; running fallback build"
            (
              cd kaspa-explorer-ng
              if [ -f package-lock.json ]; then
                npm ci --prefer-offline --no-audit --no-fund || npm install --no-audit --no-fund
              else
                npm install --no-audit --no-fund
              fi
              npm run build
            )
          fi
          cp target/release/kaspa-ng.exe kaspa-ng-${{ github.event.release.tag_name }}-windows-x64/
          for bin in stratum-bridge.exe simply-kaspa-indexer.exe K-webserver.exe K-transaction-processor.exe kasia-indexer.exe; do
            if [ -f "target/release/${bin}" ]; then
              cp "target/release/${bin}" kaspa-ng-${{ github.event.release.tag_name }}-windows-x64/
            elif [ -f "rusty-kaspa/target/release/${bin}" ]; then
              cp "rusty-kaspa/target/release/${bin}" kaspa-ng-${{ github.event.release.tag_name }}-windows-x64/
            elif [ -f "simply-kaspa-indexer/target/release/${bin}" ]; then
              cp "simply-kaspa-indexer/target/release/${bin}" kaspa-ng-${{ github.event.release.tag_name }}-windows-x64/
            elif [ -f "K-indexer/target/release/${bin}" ]; then
              cp "K-indexer/target/release/${bin}" kaspa-ng-${{ github.event.release.tag_name }}-windows-x64/
            elif [ "${bin}" = "kasia-indexer.exe" ] && [ -f "kasia-indexer/target/release/indexer.exe" ]; then
              cp "kasia-indexer/target/release/indexer.exe" kaspa-ng-${{ github.event.release.tag_name }}-windows-x64/${bin}
            fi
          done
          if [ -d target/release/kaspa-explorer-ng ]; then
            cp -r target/release/kaspa-explorer-ng kaspa-ng-${{ github.event.release.tag_name }}-windows-x64/
          elif [ -d kaspa-explorer-ng/build ]; then
            mkdir -p kaspa-ng-${{ github.event.release.tag_name }}-windows-x64/kaspa-explorer-ng
            cp -r kaspa-explorer-ng/build kaspa-ng-${{ github.event.release.tag_name }}-windows-x64/kaspa-explorer-ng/
          fi
          if [ -d target/release/K/dist ]; then
            mkdir -p kaspa-ng-${{ github.event.release.tag_name }}-windows-x64/K
            cp -r target/release/K/dist kaspa-ng-${{ github.event.release.tag_name }}-windows-x64/K/
          elif [ -d K/dist ]; then
            mkdir -p kaspa-ng-${{ github.event.release.tag_name }}-windows-x64/K
            cp -r K/dist kaspa-ng-${{ github.event.release.tag_name }}-windows-x64/K/
          fi
          if [ -d target/release/Kasia/dist ]; then
            mkdir -p kaspa-ng-${{ github.event.release.tag_name }}-windows-x64/Kasia
            cp -r target/release/Kasia/dist kaspa-ng-${{ github.event.release.tag_name }}-windows-x64/Kasia/
          elif [ -d Kasia/dist ]; then
            mkdir -p kaspa-ng-${{ github.event.release.tag_name }}-windows-x64/Kasia
            cp -r Kasia/dist kaspa-ng-${{ github.event.release.tag_name }}-windows-x64/Kasia/
          fi
          if [ -d kaspa-rest-server ]; then
            cp -r kaspa-rest-server kaspa-ng-${{ github.event.release.tag_name }}-windows-x64/
          fi
          if [ -d kaspa-socket-server ]; then
            cp -r kaspa-socket-server kaspa-ng-${{ github.event.release.tag_name }}-windows-x64/
          fi
          if [ -d Loader ]; then
            cp -r Loader kaspa-ng-${{ github.event.release.tag_name }}-windows-x64/
          fi
          if [ ! -d target/release/postgres ]; then
            echo "Missing staged PostgreSQL runtime: target/release/postgres"
            exit 1
          fi
          cp -r target/release/postgres kaspa-ng-${{ github.event.release.tag_name }}-windows-x64/
          for f in kaspa-ng.exe stratum-bridge.exe simply-kaspa-indexer.exe K-webserver.exe K-transaction-processor.exe kasia-indexer.exe; do
            [ -f "kaspa-ng-${{ github.event.release.tag_name }}-windows-x64/${f}" ] || { echo "Missing packaged binary: ${f}"; exit 1; }
          done
          for d in kaspa-explorer-ng kaspa-rest-server kaspa-socket-server Loader; do
            [ -d "kaspa-ng-${{ github.event.release.tag_name }}-windows-x64/${d}" ] || { echo "Missing packaged directory: ${d}"; exit 1; }
          done
          pwsh -NoProfile -ExecutionPolicy Bypass -File ./scripts/verify-self-hosted-python-runtime.ps1 -ArtifactRoot "kaspa-ng-${{ github.event.release.tag_name }}-windows-x64"
          [ -d "kaspa-ng-${{ github.event.release.tag_name }}-windows-x64/postgres" ] || { echo "Missing packaged directory: postgres"; exit 1; }
          [ -f "kaspa-ng-${{ github.event.release.tag_name }}-windows-x64/postgres/bin/postgres.exe" ] || { echo "Missing PostgreSQL runtime binary: postgres/bin/postgres.exe"; exit 1; }
          for d in K Kasia; do
            [ -d "kaspa-ng-${{ github.event.release.tag_name }}-windows-x64/${d}" ] || echo "Optional packaged directory missing: ${d} (continuing)"
          done
          archive="kaspa-ng-${{ github.event.release.tag_name }}-windows-x64/kaspa-ng-${{ github.event.release.tag_name }}-windows-x64.zip"
          asset_name="kaspa-ng-${{ github.event.release.tag_name }}-windows-x64.zip"
          powershell "Compress-Archive kaspa-ng-${{ github.event.release.tag_name }}-windows-x64/* \"${archive}\""
          echo "asset_path=${archive}" >> $GITHUB_ENV
          echo "asset_name=${asset_name}" >> $GITHUB_ENV

      - name: Build on MacOS (arm64)
        if: |
          runner.os == 'macOS' &&
          runner.arch == 'ARM64'
        run: |
          bash ./scripts/stage-postgres-runtime.sh target/release/postgres
          cargo build --bin kaspa-ng --release
          ./scripts/macos-bundle.sh release
          ROOT="kaspa-ng-${{ github.event.release.tag_name }}-macos-arm64"
          mkdir -p "$ROOT"
          cp -R target/release/Kaspa-NG.app "$ROOT/"
          cp target/release/kaspa-ng "$ROOT/"
          for bin in stratum-bridge simply-kaspa-indexer K-webserver K-transaction-processor kasia-indexer; do
            if [ -f "target/release/${bin}" ]; then
              cp "target/release/${bin}" "$ROOT/"
            elif [ -f "rusty-kaspa/target/release/${bin}" ]; then
              cp "rusty-kaspa/target/release/${bin}" "$ROOT/"
            elif [ -f "simply-kaspa-indexer/target/release/${bin}" ]; then
              cp "simply-kaspa-indexer/target/release/${bin}" "$ROOT/"
            elif [ -f "K-indexer/target/release/${bin}" ]; then
              cp "K-indexer/target/release/${bin}" "$ROOT/"
            elif [ "${bin}" = "kasia-indexer" ] && [ -f "kasia-indexer/target/release/indexer" ]; then
              cp "kasia-indexer/target/release/indexer" "$ROOT/${bin}"
            fi
          done
          if [ -d target/release/kaspa-explorer-ng ]; then
            cp -r target/release/kaspa-explorer-ng "$ROOT/"
          elif [ -d kaspa-explorer-ng/build ]; then
            mkdir -p "$ROOT/kaspa-explorer-ng"
            cp -r kaspa-explorer-ng/build "$ROOT/kaspa-explorer-ng/"
          fi
          if [ -d target/release/K/dist ]; then
            mkdir -p "$ROOT/K"
            cp -r target/release/K/dist "$ROOT/K/"
          elif [ -d K/dist ]; then
            mkdir -p "$ROOT/K"
            cp -r K/dist "$ROOT/K/"
          fi
          if [ -d target/release/Kasia/dist ]; then
            mkdir -p "$ROOT/Kasia"
            cp -r target/release/Kasia/dist "$ROOT/Kasia/"
          elif [ -d Kasia/dist ]; then
            mkdir -p "$ROOT/Kasia"
            cp -r Kasia/dist "$ROOT/Kasia/"
          fi
          if [ -d kaspa-rest-server ]; then
            cp -r kaspa-rest-server "$ROOT/"
          fi
          if [ -d kaspa-socket-server ]; then
            cp -r kaspa-socket-server "$ROOT/"
          fi
          if [ -d Loader ]; then
            cp -r Loader "$ROOT/"
          fi
          if [ ! -d target/release/postgres ]; then
            echo "Missing staged PostgreSQL runtime: target/release/postgres"
            exit 1
          fi
          cp -r target/release/postgres "$ROOT/"
          for f in kaspa-ng stratum-bridge simply-kaspa-indexer K-webserver K-transaction-processor kasia-indexer; do
            [ -f "$ROOT/${f}" ] || { echo "Missing packaged binary: ${f}"; exit 1; }
          done
          for d in kaspa-explorer-ng kaspa-rest-server kaspa-socket-server Loader; do
            [ -d "$ROOT/${d}" ] || { echo "Missing packaged directory: ${d}"; exit 1; }
          done
          bash ./scripts/verify-self-hosted-python-runtime.sh "$ROOT"
          [ -d "$ROOT/postgres" ] || { echo "Missing packaged directory: postgres"; exit 1; }
          [ -x "$ROOT/postgres/bin/postgres" ] || { echo "Missing PostgreSQL runtime binary: postgres/bin/postgres"; exit 1; }
          for d in K Kasia; do
            [ -d "$ROOT/${d}" ] || echo "Optional packaged directory missing: ${d} (continuing)"
          done
          [ -d "$ROOT/Kaspa-NG.app" ] || { echo "Missing packaged app bundle: Kaspa-NG.app"; exit 1; }
          [ -f "$ROOT/Kaspa-NG.app/Contents/MacOS/kaspa-ng" ] || { echo "Missing app executable in bundle"; exit 1; }
          archive="kaspa-ng-${{ github.event.release.tag_name }}-macos-arm64/kaspa-ng-${{ github.event.release.tag_name }}-macos-arm64.zip"
          asset_name="kaspa-ng-${{ github.event.release.tag_name }}-macos-arm64.zip"
          zip -r "${archive}" ./kaspa-ng-${{ github.event.release.tag_name }}-macos-arm64/*
          echo "asset_path=${archive}" >> $GITHUB_ENV
          echo "asset_name=${asset_name}" >> $GITHUB_ENV

      - name: Build on MacOS (x64)
        if: |
          runner.os == 'macOS' &&
          runner.arch == 'x64'
        run: |
          bash ./scripts/stage-postgres-runtime.sh target/release/postgres
          cargo build --bin kaspa-ng --release
          ./scripts/macos-bundle.sh release
          ROOT="kaspa-ng-${{ github.event.release.tag_name }}-macos-x64"
          mkdir -p "$ROOT"
          cp -R target/release/Kaspa-NG.app "$ROOT/"
          cp target/release/kaspa-ng "$ROOT/"
          for bin in stratum-bridge simply-kaspa-indexer K-webserver K-transaction-processor kasia-indexer; do
            if [ -f "target/release/${bin}" ]; then
              cp "target/release/${bin}" "$ROOT/"
            elif [ -f "rusty-kaspa/target/release/${bin}" ]; then
              cp "rusty-kaspa/target/release/${bin}" "$ROOT/"
            elif [ -f "simply-kaspa-indexer/target/release/${bin}" ]; then
              cp "simply-kaspa-indexer/target/release/${bin}" "$ROOT/"
            elif [ -f "K-indexer/target/release/${bin}" ]; then
              cp "K-indexer/target/release/${bin}" "$ROOT/"
            elif [ "${bin}" = "kasia-indexer" ] && [ -f "kasia-indexer/target/release/indexer" ]; then
              cp "kasia-indexer/target/release/indexer" "$ROOT/${bin}"
            fi
          done
          if [ -d target/release/kaspa-explorer-ng ]; then
            cp -r target/release/kaspa-explorer-ng "$ROOT/"
          elif [ -d kaspa-explorer-ng/build ]; then
            mkdir -p "$ROOT/kaspa-explorer-ng"
            cp -r kaspa-explorer-ng/build "$ROOT/kaspa-explorer-ng/"
          fi
          if [ -d target/release/K/dist ]; then
            mkdir -p "$ROOT/K"
            cp -r target/release/K/dist "$ROOT/K/"
          elif [ -d K/dist ]; then
            mkdir -p "$ROOT/K"
            cp -r K/dist "$ROOT/K/"
          fi
          if [ -d target/release/Kasia/dist ]; then
            mkdir -p "$ROOT/Kasia"
            cp -r target/release/Kasia/dist "$ROOT/Kasia/"
          elif [ -d Kasia/dist ]; then
            mkdir -p "$ROOT/Kasia"
            cp -r Kasia/dist "$ROOT/Kasia/"
          fi
          if [ -d kaspa-rest-server ]; then
            cp -r kaspa-rest-server "$ROOT/"
          fi
          if [ -d kaspa-socket-server ]; then
            cp -r kaspa-socket-server "$ROOT/"
          fi
          if [ -d Loader ]; then
            cp -r Loader "$ROOT/"
          fi
          if [ ! -d target/release/postgres ]; then
            echo "Missing staged PostgreSQL runtime: target/release/postgres"
            exit 1
          fi
          cp -r target/release/postgres "$ROOT/"
          for f in kaspa-ng stratum-bridge simply-kaspa-indexer K-webserver K-transaction-processor kasia-indexer; do
            [ -f "$ROOT/${f}" ] || { echo "Missing packaged binary: ${f}"; exit 1; }
          done
          for d in kaspa-explorer-ng kaspa-rest-server kaspa-socket-server Loader; do
            [ -d "$ROOT/${d}" ] || { echo "Missing packaged directory: ${d}"; exit 1; }
          done
          bash ./scripts/verify-self-hosted-python-runtime.sh "$ROOT"
          [ -d "$ROOT/postgres" ] || { echo "Missing packaged directory: postgres"; exit 1; }
          [ -x "$ROOT/postgres/bin/postgres" ] || { echo "Missing PostgreSQL runtime binary: postgres/bin/postgres"; exit 1; }
          for d in K Kasia; do
            [ -d "$ROOT/${d}" ] || echo "Optional packaged directory missing: ${d} (continuing)"
          done
          [ -d "$ROOT/Kaspa-NG.app" ] || { echo "Missing packaged app bundle: Kaspa-NG.app"; exit 1; }
          [ -f "$ROOT/Kaspa-NG.app/Contents/MacOS/kaspa-ng" ] || { echo "Missing app executable in bundle"; exit 1; }
          archive="kaspa-ng-${{ github.event.release.tag_name }}-macos-x64/kaspa-ng-${{ github.event.release.tag_name }}-macos-x64.zip"
          asset_name="kaspa-ng-${{ github.event.release.tag_name }}-macos-x64.zip"
          zip -r "${archive}" ./kaspa-ng-${{ github.event.release.tag_name }}-macos-x64/*
          echo "asset_path=${archive}" >> $GITHUB_ENV
          echo "asset_name=${asset_name}" >> $GITHUB_ENV

      - name: Build on Linux
        if: runner.os == 'Linux'
        run: |
          bash ./scripts/stage-postgres-runtime.sh target/release/postgres
          cargo build --bin kaspa-ng --release
          mkdir -p .debpkg/usr/bin
          cp target/release/kaspa-ng .debpkg/usr/bin/
          mkdir kaspa-ng-${{ github.event.release.tag_name }}-linux-gnu-amd64 || true
          cp target/release/kaspa-ng kaspa-ng-${{ github.event.release.tag_name }}-linux-gnu-amd64/
          for bin in stratum-bridge simply-kaspa-indexer K-webserver K-transaction-processor kasia-indexer; do
            if [ -f "target/release/${bin}" ]; then
              cp "target/release/${bin}" kaspa-ng-${{ github.event.release.tag_name }}-linux-gnu-amd64/
              cp "target/release/${bin}" .debpkg/usr/bin/
            elif [ -f "rusty-kaspa/target/release/${bin}" ]; then
              cp "rusty-kaspa/target/release/${bin}" kaspa-ng-${{ github.event.release.tag_name }}-linux-gnu-amd64/
              cp "rusty-kaspa/target/release/${bin}" .debpkg/usr/bin/
            elif [ -f "simply-kaspa-indexer/target/release/${bin}" ]; then
              cp "simply-kaspa-indexer/target/release/${bin}" kaspa-ng-${{ github.event.release.tag_name }}-linux-gnu-amd64/
              cp "simply-kaspa-indexer/target/release/${bin}" .debpkg/usr/bin/
            elif [ -f "K-indexer/target/release/${bin}" ]; then
              cp "K-indexer/target/release/${bin}" kaspa-ng-${{ github.event.release.tag_name }}-linux-gnu-amd64/
              cp "K-indexer/target/release/${bin}" .debpkg/usr/bin/
            elif [ "${bin}" = "kasia-indexer" ] && [ -f "kasia-indexer/target/release/indexer" ]; then
              cp "kasia-indexer/target/release/indexer" kaspa-ng-${{ github.event.release.tag_name }}-linux-gnu-amd64/${bin}
              cp "kasia-indexer/target/release/indexer" .debpkg/usr/bin/${bin}
            fi
          done
          if [ -d target/release/kaspa-explorer-ng ]; then
            cp -r target/release/kaspa-explorer-ng kaspa-ng-${{ github.event.release.tag_name }}-linux-gnu-amd64/
            mkdir -p .debpkg/usr/bin/kaspa-explorer-ng
            cp -r target/release/kaspa-explorer-ng/* .debpkg/usr/bin/kaspa-explorer-ng/
          elif [ -d kaspa-explorer-ng/build ]; then
            mkdir -p kaspa-ng-${{ github.event.release.tag_name }}-linux-gnu-amd64/kaspa-explorer-ng
            cp -r kaspa-explorer-ng/build kaspa-ng-${{ github.event.release.tag_name }}-linux-gnu-amd64/kaspa-explorer-ng/
            mkdir -p .debpkg/usr/bin/kaspa-explorer-ng
            cp -r kaspa-explorer-ng/build .debpkg/usr/bin/kaspa-explorer-ng/
          fi
          if [ -d target/release/K/dist ]; then
            mkdir -p kaspa-ng-${{ github.event.release.tag_name }}-linux-gnu-amd64/K
            cp -r target/release/K/dist kaspa-ng-${{ github.event.release.tag_name }}-linux-gnu-amd64/K/
            mkdir -p .debpkg/usr/bin/K
            cp -r target/release/K/dist .debpkg/usr/bin/K/
          elif [ -d K/dist ]; then
            mkdir -p kaspa-ng-${{ github.event.release.tag_name }}-linux-gnu-amd64/K
            cp -r K/dist kaspa-ng-${{ github.event.release.tag_name }}-linux-gnu-amd64/K/
            mkdir -p .debpkg/usr/bin/K
            cp -r K/dist .debpkg/usr/bin/K/
          fi
          if [ -d target/release/Kasia/dist ]; then
            mkdir -p kaspa-ng-${{ github.event.release.tag_name }}-linux-gnu-amd64/Kasia
            cp -r target/release/Kasia/dist kaspa-ng-${{ github.event.release.tag_name }}-linux-gnu-amd64/Kasia/
            mkdir -p .debpkg/usr/bin/Kasia
            cp -r target/release/Kasia/dist .debpkg/usr/bin/Kasia/
          elif [ -d Kasia/dist ]; then
            mkdir -p kaspa-ng-${{ github.event.release.tag_name }}-linux-gnu-amd64/Kasia
            cp -r Kasia/dist kaspa-ng-${{ github.event.release.tag_name }}-linux-gnu-amd64/Kasia/
            mkdir -p .debpkg/usr/bin/Kasia
            cp -r Kasia/dist .debpkg/usr/bin/Kasia/
          fi
          if [ -d kaspa-rest-server ]; then
            cp -r kaspa-rest-server kaspa-ng-${{ github.event.release.tag_name }}-linux-gnu-amd64/
          fi
          if [ -d kaspa-socket-server ]; then
            cp -r kaspa-socket-server kaspa-ng-${{ github.event.release.tag_name }}-linux-gnu-amd64/
          fi
          if [ -d Loader ]; then
            cp -r Loader kaspa-ng-${{ github.event.release.tag_name }}-linux-gnu-amd64/
          fi
          if [ ! -d target/release/postgres ]; then
            echo "Missing staged PostgreSQL runtime: target/release/postgres"
            exit 1
          fi
          cp -r target/release/postgres kaspa-ng-${{ github.event.release.tag_name }}-linux-gnu-amd64/
          cp -r target/release/postgres .debpkg/usr/bin/
          cp core/resources/icons/icon-256.png kaspa-ng-${{ github.event.release.tag_name }}-linux-gnu-amd64/kaspa-ng.png
          cp core/resources/packaging/kaspa-ng.desktop kaspa-ng-${{ github.event.release.tag_name }}-linux-gnu-amd64/
          for f in kaspa-ng stratum-bridge simply-kaspa-indexer K-webserver K-transaction-processor kasia-indexer; do
            [ -f "kaspa-ng-${{ github.event.release.tag_name }}-linux-gnu-amd64/${f}" ] || { echo "Missing packaged binary: ${f}"; exit 1; }
          done
          for d in kaspa-explorer-ng kaspa-rest-server kaspa-socket-server Loader; do
            [ -d "kaspa-ng-${{ github.event.release.tag_name }}-linux-gnu-amd64/${d}" ] || { echo "Missing packaged directory: ${d}"; exit 1; }
          done
          bash ./scripts/verify-linux-artifact.sh "kaspa-ng-${{ github.event.release.tag_name }}-linux-gnu-amd64"
          for d in K Kasia; do
            [ -d "kaspa-ng-${{ github.event.release.tag_name }}-linux-gnu-amd64/${d}" ] || echo "Optional packaged directory missing: ${d} (continuing)"
          done
          mkdir -p .debpkg/usr/share/icons/hicolor/256x256/apps
          cp core/resources/icons/icon-256.png .debpkg/usr/share/icons/hicolor/256x256/apps/kaspa-ng.png
          mkdir -p .debpkg/usr/share/applications
          cp core/resources/packaging/kaspa-ng.desktop .debpkg/usr/share/applications/
          archive="kaspa-ng-${{ github.event.release.tag_name }}-linux-gnu-amd64/kaspa-ng-${{ github.event.release.tag_name }}-linux-gnu-amd64.zip"
          asset_name="kaspa-ng-${{ github.event.release.tag_name }}-linux-gnu-amd64.zip"
          zip -r "${archive}" ./kaspa-ng-${{ github.event.release.tag_name }}-linux-gnu-amd64/*
          echo "archive=${archive}" >> $GITHUB_ENV
          echo "asset_name=${asset_name}" >> $GITHUB_ENV

      - name: Create Linux Debian Package
        if: runner.os == 'Linux'
        id: package_debian
        uses: jiro4989/build-deb-action@v3
        with:
          package: kaspa-ng
          package_root: .debpkg
          maintainer: ASPECTRON
          version: ${{ github.ref }} # refs/tags/v*.*.*
          arch: 'amd64'
          depends: 'libglib2.0-0, libatk1.0-0, libgtk-3-0, python3, python3-venv, python3-pip'
          desc: 'Kaspa NG desktop p2p node and wallet'

      - name: Upload release asset
        if: runner.os == 'Windows'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: "./${{ env.asset_path }}"
          asset_name: "${{ env.asset_name }}"
          asset_content_type: application/zip

      - name: Build on MacOS (arm64)
        if: |
          runner.os == 'macOS' &&
          runner.arch == 'ARM64'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: "./${{ env.asset_path }}"
          asset_name: "${{ env.asset_name }}"
          asset_content_type: application/zip

      - name: Build on MacOS (x64)
        if: |
          runner.os == 'macOS' &&
          runner.arch == 'x64'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: "./${{ env.asset_path }}"
          asset_name: "${{ env.asset_name }}"
          asset_content_type: application/zip

      - name: Upload debian package
        if: runner.os == 'Linux'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: "./${{ steps.package_debian.outputs.file_name }}"
          asset_name: "${{ steps.package_debian.outputs.file_name }}"
          asset_content_type: application/vnd.debian.binary-package
