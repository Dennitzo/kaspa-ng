name: Tests

on: [push, pull_request]

jobs:
  check:
    name: Checks
    runs-on: ubuntu-22.04
    env:
      CI_LOG_DIR: ci-logs
      PKG_CONFIG_PATH: /usr/lib/x86_64-linux-gnu/pkgconfig:/usr/share/pkgconfig
    steps:

      - name: Install desktop dependencies
        run: |
          sudo apt-get update
          sudo apt install -y \
            build-essential \
            curl \
            git \
            libssl-dev \
            libglib2.0-dev \
            libatk1.0-dev \
            libgtk-4-dev \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            libx11-dev \
            protobuf-compiler \
            libprotobuf-dev \
            pkg-config
          echo "PKG_CONFIG_PATH=/usr/lib/x86_64-linux-gnu/pkgconfig:/usr/share/pkgconfig" >> $GITHUB_ENV

      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ubuntu-22.04-${{ runner.arch }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Init CI logs
        run: mkdir -p "${{ env.CI_LOG_DIR }}"

      - name: Run cargo check
        run: |
          set -o pipefail
          cargo check --tests --workspace --benches 2>&1 | tee "${{ env.CI_LOG_DIR }}/cargo-check.log"

      - name: Prepare error summary
        if: failure()
        shell: bash
        run: |
          set -e
          mkdir -p "${{ env.CI_LOG_DIR }}"
          summary="${{ env.CI_LOG_DIR }}/ci-error-summary.txt"
          : > "$summary"
          shopt -s nullglob
          for f in "${{ env.CI_LOG_DIR }}"/*.log; do
            echo "==> ${f##*/}" >> "$summary"
            grep -in "error" "$f" >> "$summary" || true
            echo "" >> "$summary"
          done

      - name: Upload error summary
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-error-summary-check
          path: ${{ env.CI_LOG_DIR }}/ci-error-summary.txt
          overwrite: true

  test:
    name: Tests
    # runs-on: ${{ matrix.os }}
    runs-on: ubuntu-22.04
    env:
      CI_LOG_DIR: ci-logs
      PKG_CONFIG_PATH: /usr/lib/x86_64-linux-gnu/pkgconfig:/usr/share/pkgconfig
    strategy:
      fail-fast: false
      # matrix:
        # os: [ ubuntu-latest, macos-latest, windows-latest ]
    steps:
      - name: Install desktop dependencies
        run: |
          sudo apt-get update
          sudo apt install -y \
            build-essential \
            curl \
            git \
            libssl-dev \
            libglib2.0-dev \
            libatk1.0-dev \
            libgtk-4-dev \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            libx11-dev \
            protobuf-compiler \
            libprotobuf-dev \
            pkg-config
          echo "PKG_CONFIG_PATH=/usr/lib/x86_64-linux-gnu/pkgconfig:/usr/share/pkgconfig" >> $GITHUB_ENV

      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Fix CRLF on Windows
        if: runner.os == 'Windows'
        run: git config --global core.autocrlf false

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
      
      - name: Set up cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ubuntu-22.04
      
      - name: Install cargo-nextest
        run: cargo install --locked cargo-nextest

      - name: Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ubuntu-22.04-${{ runner.arch }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Init CI logs
        run: mkdir -p "${{ env.CI_LOG_DIR }}"

      - name: Run cargo build
        run: |
          set -o pipefail
          cargo build --bin kaspa-ng --release --workspace --all --tests --benches 2>&1 | tee "${{ env.CI_LOG_DIR }}/cargo-build.log"

      - name: Run cargo test regular features
        run: |
          set -o pipefail
          cargo nextest run --release --workspace 2>&1 | tee "${{ env.CI_LOG_DIR }}/cargo-nextest.log"

      - name: Run cargo doc tests
        run: |
          set -o pipefail
          cargo test --doc --release --workspace 2>&1 | tee "${{ env.CI_LOG_DIR }}/cargo-doc-tests.log"

      - name: Prepare error summary
        if: failure()
        shell: bash
        run: |
          set -e
          mkdir -p "${{ env.CI_LOG_DIR }}"
          summary="${{ env.CI_LOG_DIR }}/ci-error-summary.txt"
          : > "$summary"
          shopt -s nullglob
          for f in "${{ env.CI_LOG_DIR }}"/*.log; do
            echo "==> ${f##*/}" >> "$summary"
            grep -in "error" "$f" >> "$summary" || true
            echo "" >> "$summary"
          done

      - name: Upload error summary
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-error-summary-test
          path: ${{ env.CI_LOG_DIR }}/ci-error-summary.txt
          overwrite: true

  lints:
    name: Lints
    runs-on: ubuntu-22.04
    env:
      CI_LOG_DIR: ci-logs
      PKG_CONFIG_PATH: /usr/lib/x86_64-linux-gnu/pkgconfig:/usr/share/pkgconfig
    steps:

      - name: Install desktop dependencies
        run: |
          sudo apt-get update
          sudo apt install -y \
            build-essential \
            curl \
            git \
            libssl-dev \
            libglib2.0-dev \
            libatk1.0-dev \
            libgtk-4-dev \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            libx11-dev \
            protobuf-compiler \
            libprotobuf-dev \
            pkg-config
          echo "PKG_CONFIG_PATH=/usr/lib/x86_64-linux-gnu/pkgconfig:/usr/share/pkgconfig" >> $GITHUB_ENV

      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ubuntu-22.04-${{ runner.arch }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Init CI logs
        run: mkdir -p "${{ env.CI_LOG_DIR }}"

      - name: Run cargo fmt
        run: |
          set -o pipefail
          cargo fmt --all -- --check 2>&1 | tee "${{ env.CI_LOG_DIR }}/cargo-fmt.log"

      - name: Run cargo clippy
        run: |
          set -o pipefail
          cargo clippy --workspace --all-targets --tests --benches -- -D warnings 2>&1 | tee "${{ env.CI_LOG_DIR }}/cargo-clippy.log"

      - name: Prepare error summary
        if: failure()
        shell: bash
        run: |
          set -e
          mkdir -p "${{ env.CI_LOG_DIR }}"
          summary="${{ env.CI_LOG_DIR }}/ci-error-summary.txt"
          : > "$summary"
          shopt -s nullglob
          for f in "${{ env.CI_LOG_DIR }}"/*.log; do
            echo "==> ${f##*/}" >> "$summary"
            grep -in "error" "$f" >> "$summary" || true
            echo "" >> "$summary"
          done

      - name: Upload error summary
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-error-summary-lints
          path: ${{ env.CI_LOG_DIR }}/ci-error-summary.txt
          overwrite: true

  wasm32:
    name: WASM32 Builds
    runs-on: ubuntu-22.04
    env:
      CI_LOG_DIR: ci-logs
      PKG_CONFIG_PATH: /usr/lib/x86_64-linux-gnu/pkgconfig:/usr/share/pkgconfig
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Install llvm
        id: install_llvm
        continue-on-error: true
        run: |
          set -euo pipefail
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
          # Refresh mirrors right before install to avoid transient 404s on package rotations.
          for attempt in 1 2 3; do
            sudo apt-get update && break
            if [ "$attempt" -eq 3 ]; then
              echo "apt-get update failed after ${attempt} attempts"
              exit 1
            fi
            sleep 5
          done
          sudo apt-get install -y --fix-missing \
            clang-15 lldb-15 lld-15 clangd-15 clang-tidy-15 clang-format-15 clang-tools-15 \
            llvm-15-dev lld-15 lldb-15 llvm-15-tools libomp-15-dev libc++-15-dev \
            libc++abi-15-dev libclang-common-15-dev libclang-15-dev libclang-cpp15-dev \
            libunwind-15-dev
          # Make Clang 15 default
          sudo update-alternatives --install /usr/bin/clang++ clang++ /usr/lib/llvm-15/bin/clang++ 100
          sudo update-alternatives --install /usr/bin/clang clang /usr/lib/llvm-15/bin/clang 100
          sudo update-alternatives --install /usr/bin/clang-format clang-format /usr/lib/llvm-15/bin/clang-format 100
          sudo update-alternatives --install /usr/bin/clang-tidy clang-tidy /usr/lib/llvm-15/bin/clang-tidy 100
          sudo update-alternatives --install /usr/bin/run-clang-tidy run-clang-tidy /usr/lib/llvm-15/bin/run-clang-tidy 100
          # Alias cc to clang
          sudo update-alternatives --install /usr/bin/cc cc /usr/lib/llvm-15/bin/clang 0
          sudo update-alternatives --install /usr/bin/c++ c++ /usr/lib/llvm-15/bin/clang++ 0

      - name: Install gcc-multilib
        # gcc-multilib allows clang to find gnu libraries properly
        run: |
          sudo apt-get update
          sudo apt install -y gcc-multilib

      - name: Install apt prerequisites
        if: ${{ runner.os == 'Linux' }}
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: build-essential curl git libssl-dev libglib2.0-dev libatk1.0-dev libgtk-4-dev libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev libsoup-3.0-dev libx11-dev protobuf-compiler libprotobuf-dev pkg-config
          version: 1.0

      - name: Install stable toolchain
        if: steps.install_llvm.outcome == 'success' && steps.install_llvm.conclusion == 'success'
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo install wasm-pack and trunk
        run: |
          cargo install wasm-pack --locked
          cargo install trunk --locked
          cargo install wasm-bindgen-cli --version 0.2.100 --locked

      - name: Add wasm32 target
        run: rustup target add wasm32-unknown-unknown

      - name: Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            ~/.cache/trunk/
            target/
          key: ubuntu-22.04-${{ runner.arch }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Init CI logs
        run: mkdir -p "${{ env.CI_LOG_DIR }}"

      # - name: Run cargo check for wasm32 target
      #   run: cargo clippy --target wasm32-unknown-unknown

      - name: Build Web App
        env:
          RUSTFLAGS: --cfg=web_sys_unstable_apis --cfg=wasm_js --cfg=getrandom_backend="wasm_js"
          CARGO_NET_RETRY: 10
          CARGO_HTTP_MULTIPLEXING: "false"
        run: |
          set -o pipefail
          for attempt in 1 2 3; do
            trunk build --release 2>&1 | tee "${{ env.CI_LOG_DIR }}/trunk-build.log" && break
            if [ "$attempt" -eq 3 ]; then
              echo "trunk build failed after ${attempt} attempts"
              exit 1
            fi
            echo "trunk build failed (attempt ${attempt}), retrying in 10s..."
            sleep 10
          done

      - name: Build Chrome Browser Extension
        env:
          RUSTFLAGS: --cfg=web_sys_unstable_apis --cfg=wasm_js --cfg=getrandom_backend="wasm_js"
        run: |
          set -o pipefail
          rm -rf ./dist-chrome
          mkdir ./dist-chrome
          mkdir ./dist-chrome/icons
          # copy resources
          cp -r ./core/resources/icons ./dist-chrome/
          cp ./extensions/chrome/style.css ./dist-chrome/
          cp ./extensions/chrome/manifest.json ./dist-chrome/
          cp ./extensions/chrome/popup.html ./dist-chrome/
          cp ./extensions/chrome/popup.js ./dist-chrome/
          cp ./extensions/chrome/background.js ./dist-chrome/
          # build
          wasm-pack build --target web --out-name kaspa-ng --out-dir ../../dist-chrome ./extensions/chrome 2>&1 | tee "${{ env.CI_LOG_DIR }}/wasm-pack.log"

      - name: Prepare error summary
        if: failure()
        shell: bash
        run: |
          set -e
          mkdir -p "${{ env.CI_LOG_DIR }}"
          summary="${{ env.CI_LOG_DIR }}/ci-error-summary.txt"
          : > "$summary"
          shopt -s nullglob
          for f in "${{ env.CI_LOG_DIR }}"/*.log; do
            echo "==> ${f##*/}" >> "$summary"
            grep -in "error" "$f" >> "$summary" || true
            echo "" >> "$summary"
          done

      - name: Upload error summary
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-error-summary-wasm32
          path: ${{ env.CI_LOG_DIR }}/ci-error-summary.txt
          overwrite: true

  build-release:
    runs-on: ${{ matrix.os }}
    env:
      CI_LOG_DIR: ci-logs
      PKG_CONFIG_PATH: /usr/lib/x86_64-linux-gnu/pkgconfig:/usr/share/pkgconfig
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-22.04, windows-latest, macos-latest ]
    name: Building, ${{ matrix.os }}
    steps:

      - name: Fix CRLF on Windows
        if: runner.os == 'Windows'
        run: git config --global core.autocrlf false

      - name: Install apt prerequisites
        if: ${{ runner.os == 'Linux' }}
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: build-essential curl git libssl-dev libglib2.0-dev libatk1.0-dev libgtk-4-dev libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev libsoup-3.0-dev libx11-dev protobuf-compiler libprotobuf-dev pkg-config
          version: 1.0

      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Clone KasVault
        shell: bash
        run: |
          if [ ! -d kasvault ]; then
            git clone --depth 1 https://github.com/coderofstuff/kasvault.git kasvault
          fi

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: |
            kaspa-explorer-ng/package-lock.json
            K/package-lock.json
            Kasia/package-lock.json
            kasvault/package-lock.json

      - name: Setup Environment
        shell: bash
        run: echo "SHORT_SHA=`git rev-parse --short HEAD`" >> $GITHUB_ENV

      - name: Install Protoc (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler libprotobuf-dev
          echo "PKG_CONFIG_PATH=/usr/lib/x86_64-linux-gnu/pkgconfig:/usr/share/pkgconfig" >> $GITHUB_ENV

      - name: Install Protoc (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf

      - name: Install LLVM for wasm on macOS
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          brew install llvm
          LLVM_BIN="$(brew --prefix llvm)/bin"
          echo "${LLVM_BIN}" >> "${GITHUB_PATH}"
          echo "CC_wasm32_unknown_unknown=${LLVM_BIN}/clang" >> "${GITHUB_ENV}"
          echo "AR_wasm32_unknown_unknown=${LLVM_BIN}/llvm-ar" >> "${GITHUB_ENV}"

      - name: Install Protoc (Windows)
        if: runner.os == 'Windows'
        uses: arduino/setup-protoc@v3
        with:
          version: "31.1"
          repo-token: ${{ github.token }}

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-${{ runner.arch }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install wasm-pack
        shell: bash
        run: |
          if ! command -v wasm-pack >/dev/null 2>&1; then
            cargo install wasm-pack --locked
          fi

      - name: Prepare Kasia wasm package
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -d Kasia ]; then
            exit 0
          fi

          is_compatible_kaspa_wasm_dir() {
            local dir="$1"
            local pkg="$dir/package.json"
            local js="$dir/kaspa.js"
            local dts="$dir/kaspa.d.ts"
            [ -f "$pkg" ] && [ -f "$js" ] && [ -f "$dts" ] || return 1
            grep -Eq '"name"[[:space:]]*:[[:space:]]*"kaspa-wasm"' "$pkg" || return 1
            grep -Eq 'export[[:space:]]+class[[:space:]]+RpcClient' "$js" || return 1
            grep -Eq 'export[[:space:]]+const[[:space:]]+ConnectStrategy' "$js" || return 1
            grep -Eq 'export[[:space:]]+const[[:space:]]+Encoding' "$js" || return 1
            grep -Eq 'export[[:space:]]+class[[:space:]]+Resolver' "$js" || return 1
            grep -Eq 'export[[:space:]]+function[[:space:]]+initConsolePanicHook' "$js" || return 1
            grep -Eq 'export[[:space:]]+default' "$js" || return 1
            return 0
          }

          if is_compatible_kaspa_wasm_dir Kasia/wasm; then
            echo "Kasia wasm package already present and compatible"
            exit 0
          fi
          if [ -d Kasia/wasm ]; then
            echo "Existing Kasia/wasm is incompatible; replacing"
            rm -rf Kasia/wasm
          fi
          TMP_ROOT="$(mktemp -d 2>/dev/null || mktemp -d -t kasiawasm)"
          trap 'rm -rf "$TMP_ROOT"' EXIT

          find_kaspa_wasm_dir() {
            local search_root="$1"
            [ -d "$search_root" ] || return 1

            local direct_candidates=(
              "$search_root/kaspa-wasm32-sdk/web/kaspa"
              "$search_root/web/kaspa"
            )
            for candidate in "${direct_candidates[@]}"; do
              if is_compatible_kaspa_wasm_dir "$candidate"; then
                echo "$candidate"
                return 0
              fi
            done

            while IFS= read -r pkg; do
              local parent
              parent="$(dirname "$pkg")"
              if is_compatible_kaspa_wasm_dir "$parent"; then
                echo "$parent"
                return 0
              fi
            done < <(find "$search_root" -type f -path '*/web/kaspa/package.json')
            return 1
          }

          copy_pkg() {
            local src_dir="$1"
            echo "Using kaspa-wasm package from: $src_dir"
            rm -rf Kasia/wasm
            mkdir -p Kasia/wasm
            cp -R "$src_dir"/. Kasia/wasm/
            is_compatible_kaspa_wasm_dir Kasia/wasm
          }

          if PKG_DIR="$(find_kaspa_wasm_dir rusty-kaspa 2>/dev/null)"; then
            copy_pkg "$PKG_DIR"
            exit 0
          fi

          if [ -n "${KASIA_WASM_SDK_URL:-}" ]; then
            URLS=("${KASIA_WASM_SDK_URL}")
          else
            URLS=(
              "https://github.com/IzioDev/rusty-kaspa/releases/download/v1.0.1-beta1/kaspa-wasm32-sdk-v1.0.1-beta1.zip"
              "https://github.com/kaspanet/rusty-kaspa/releases/download/v1.0.0/kaspa-wasm32-sdk-v1.0.0.zip"
            )
          fi

          for url in "${URLS[@]}"; do
            echo "Attempting Kasia wasm SDK download from ${url}"
            zip_path="${TMP_ROOT}/sdk.zip"
            extract_dir="${TMP_ROOT}/extract"
            rm -rf "$zip_path" "$extract_dir"
            if ! curl -fL --retry 2 -o "$zip_path" "$url"; then
              continue
            fi
            python3 -c 'import pathlib,sys,zipfile; p=pathlib.Path(sys.argv[1]); d=pathlib.Path(sys.argv[2]); d.mkdir(parents=True, exist_ok=True); zipfile.ZipFile(p).extractall(d)' "$zip_path" "$extract_dir"
            if PKG_DIR="$(find_kaspa_wasm_dir "$extract_dir" 2>/dev/null)"; then
              copy_pkg "$PKG_DIR"
              exit 0
            fi
          done

          echo "Unable to locate kaspa-wasm package for Kasia/wasm"
          exit 1

      - name: Init CI logs
        run: mkdir -p "${{ env.CI_LOG_DIR }}"

      - name: Build on Windows
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir kaspa-ng-${{ env.SHORT_SHA }}-windows-x64 || true
          set -o pipefail
          KASIA_WASM_AUTO_FETCH=0 cargo build --release 2>&1 | tee "${{ env.CI_LOG_DIR }}/cargo-build-windows.log"
          if [ ! -d target/release/K/dist ] && [ ! -d K/dist ] && [ -d K ]; then
            echo "K dist missing after cargo build; running fallback build"
            (
              cd K
              if [ -f package-lock.json ]; then
                npm ci --prefer-offline --no-audit --no-fund || npm install --no-audit --no-fund
              else
                npm install --no-audit --no-fund
              fi
              npm run build
            )
          fi
          if [ ! -d target/release/Kasia/dist ] && [ ! -d Kasia/dist ] && [ -d Kasia ]; then
            echo "Kasia dist missing after cargo build; running fallback build"
            (
              cd Kasia
              if [ -f package-lock.json ]; then
                npm ci --prefer-offline --no-audit --no-fund || npm install --no-audit --no-fund
              else
                npm install --no-audit --no-fund
              fi
              npm run wasm:build || true
              npm run build:production || npm exec vite build
            )
          fi
          if [ ! -d target/release/KasVault/build ] && [ ! -d kasvault/build ] && [ -d kasvault ]; then
            echo "KasVault build missing after cargo build; running fallback build"
            (
              cd kasvault
              if [ -f package-lock.json ]; then
                npm ci --prefer-offline --no-audit --no-fund || npm install --no-audit --no-fund
              else
                npm install --no-audit --no-fund
              fi
              npm run build
            )
          fi
          if [ ! -d target/release/kaspa-explorer-ng ] && [ ! -d kaspa-explorer-ng/build ] && [ -d kaspa-explorer-ng ]; then
            echo "kaspa-explorer-ng build missing after cargo build; running fallback build"
            (
              cd kaspa-explorer-ng
              if [ -f package-lock.json ]; then
                npm ci --prefer-offline --no-audit --no-fund || npm install --no-audit --no-fund
              else
                npm install --no-audit --no-fund
              fi
              npm run build
            )
          fi
          cp target/release/kaspa-ng.exe kaspa-ng-${{ env.SHORT_SHA }}-windows-x64/kaspa-ng.exe
          for bin in stratum-bridge.exe kaspa-miner.exe rothschild.exe simply-kaspa-indexer.exe K-webserver.exe K-transaction-processor.exe kasia-indexer.exe; do
            if [ -f "target/release/${bin}" ]; then
              cp "target/release/${bin}" kaspa-ng-${{ env.SHORT_SHA }}-windows-x64/
            elif [ -f "rusty-kaspa/target/release/${bin}" ]; then
              cp "rusty-kaspa/target/release/${bin}" kaspa-ng-${{ env.SHORT_SHA }}-windows-x64/
            elif [ -f "cpuminer/target/release/${bin}" ]; then
              cp "cpuminer/target/release/${bin}" kaspa-ng-${{ env.SHORT_SHA }}-windows-x64/
            elif [ -f "simply-kaspa-indexer/target/release/${bin}" ]; then
              cp "simply-kaspa-indexer/target/release/${bin}" kaspa-ng-${{ env.SHORT_SHA }}-windows-x64/
            elif [ -f "K-indexer/target/release/${bin}" ]; then
